<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر أمازون - مصحف الشقيري</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; }

        body {
            font-family: 'Amiri', serif;
            background: #f5f0e1;
            margin: 0;
            padding: 15px;
            color: #2b2b2b;
        }

        .header {
            background: linear-gradient(135deg, #0f5132, #1a7a4d);
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .header h1 {
            color: #d4af37;
            margin: 0;
            font-size: 28px;
        }

        .header p {
            margin: 8px 0 0;
            opacity: 0.9;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
        }

        .product-card {
            position: relative;
            background: #fff;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
        }

        .product-card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
            background: #eee;
        }

        .product-info h3 {
            font-size: 16px;
            margin: 0 0 8px;
        }

        .rating {
            font-size: 14px;
            color: #555;
            margin-bottom: 8px;
        }

        .price {
            margin-bottom: 10px;
        }

        .new-price {
            color: #0f5132;
            font-weight: bold;
            font-size: 18px;
        }

        .old-price {
            color: #999;
            text-decoration: line-through;
            font-size: 14px;
            margin-right: 6px;
        }

        .discount-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #c0392b;
            color: #fff;
            font-size: 12px;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 6px;
            z-index: 2;
        }

        .store-badge {
            display: inline-block;
            font-size: 12px;
            padding: 3px 10px;
            border-radius: 6px;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .store-badge.amazon {
            background: #ff9900;
            color: #000;
        }

        .store-badge.noon {
            background: #f5e642;
            color: #000;
        }

        .buy-btn {
            display: inline-block;
            background: #d4af37;
            color: #0f5132;
            text-decoration: none;
            font-weight: bold;
            padding: 10px;
            border-radius: 8px;
            margin-top: auto;
            font-family: 'Amiri', serif;
            font-size: 14px;
        }

        .buy-btn:hover {
            background: #c29d2e;
        }

        .buy-btn.noon {
            background: #f5e642;
            color: #000;
        }

        .buy-btn.noon:hover {
            background: #e0d03a;
        }

        .loading, .error {
            text-align: center;
            width: 100%;
            grid-column: 1 / -1;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🛒 متجر أمازون</h1>
        <p>أفضل المنتجات بأفضل الأسعار</p>
    </div>

    <div id="productsList" class="products-grid">
        <p class="loading">جاري التحميل...</p>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
